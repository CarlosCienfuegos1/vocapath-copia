name: Deploy static content to Pages

on:
  push:
    branches: ['main'] # o 'master' si tu rama principal se llama así

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # o 'pnpm' según lo que uses (veo que tienes pnpm-lock.yaml)
          
      - name: Install dependencies
        run: npm install # Cambia a "pnpm install" si usas pnpm
        
      - name: Build
        run: npm run build # Cambia a "pnpm run build" si usas pnpm
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
